<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product 1</title>
  <link rel="stylesheet" href="Style.css" />
</head>

<body>
  <div class="container">

    <!-- Top Navigation -->
    <header class="nav">
      <img src="../Images/SP LOGO.svg" class="logo" alt="SP Brand Logo" />

      <div class="nav-icons">
        <img src="../Images/CART.svg" alt="Cart" />
        <img src="../Images/WL.svg" alt="Wishlist" />
        <img src="../Images/SETTINGS.svg" alt="Settings" />
      </div>
    </header>

    <!-- White Video Area -->
    <section class="product-hero">
      <video class="product-hero" autoplay muted loop preload="auto" title="Background video">
        <source src="../Video/Cat.mp4" type="video/mp4">
      </video>
      <button class="cart-btn">Add to Cart</button>
    </section>

  </div>
</body>
</html>
